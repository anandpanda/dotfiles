#? Config file for btop — system resource monitor
#? Docs: https://github.com/aristocratos/btop#configurability
#? Theme directory: /usr/share/btop/themes (system) or ~/.config/btop/themes (user)

# Theme — built-in dark theme that pairs cleanly with Catppuccin Mocha terminal
color_theme = "tokyo-night"

# Use truecolor (24-bit). Disable only on terminals that don't support it.
truecolor = True

# Force dark theme regardless of terminal background detection
theme_background = False

# Vim-style navigation (h/j/k/l) in addition to arrow keys
vim_keys = True

# Rounded corners on boxes — looks cleaner with Nerd Font terminals
rounded_corners = True

# Update interval (ms). Default 2000 is fine; 1500 feels snappier without burning CPU.
update_ms = 1500

# Show CPU/mem/net/proc boxes by default; switch with `1`/`2`/`3`/`4` keys
shown_boxes = "cpu mem net proc"

# Process list — sorted by CPU%, tree view off (toggle with `e`)
proc_sorting = "cpu lazy"
proc_tree = False
proc_colors = True
proc_gradient = True
proc_per_core = False
proc_mem_bytes = True

# CPU graph — show all cores stacked
cpu_graph_upper = "total"
cpu_graph_lower = "total"
show_cpu_freq = True

# Show temperature scale + fan speeds if sensors are available
check_temp = True
cpu_sensor = "Auto"
show_coretemp = True
temp_scale = "celsius"

# Network — auto-detect default interface
net_download = 100
net_upload = 100
net_auto = True
net_sync = False

# Show free disk space for these mountpoints (whitespace-separated). Empty = all.
disks_filter = ""
show_swap = True
swap_disk = True
show_disks = True
only_physical = True
use_fstab = True
